<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button class="menu-btn active" data-target="page1">Страница 1</button>
    <button class="menu-btn" data-target="page2">Страница 2</button>
    <div class="content-block active" data-group="pages" id="page1">
    <h3>Контент 1</h3>
</div>
<div class="content-block" data-group="pages" id="page2">
    <h3>Контент 2</h3>
</div>
<button id="btn">Нажми</button>
<script>
    document.getElementById('btn').addEventListener('click', function() {
        console.log('Функция вызвана');
    });

    document.querySelectorAll('.menu-btn').forEach(button => {
    button.addEventListener('click', () => {
        document.querySelectorAll('.menu-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.content-block').forEach(block => block.classList.remove('active'));

        button.classList.add('active');

        const targetId = button.getAttribute('data-target');
        document.getElementById(targetId).classList.add('active');
    });
});
</script>

</body>
</html>
